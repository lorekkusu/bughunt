# bughunt harness configuration.
# Paths are relative to this harness/ directory.

[paths]
projects_dir = "../projects"
answers_dir  = "../answers"
scratch_dir  = "../projects/.bench"   # gitignored working area for review copies
results_dir  = "results"              # committed structured results (one json per config)
reports_dir  = "reports"              # generated markdown/HTML
pricing_file = "pricing.json"
prompt_file  = "review_prompt.md"

[run]
default_runs = 3
prompt_id    = "standard-v1"          # bump if you edit review_prompt.md

[judge]
# LLM-as-judge runs via the local `claude` CLI (headless, no API key needed).
# Deliberately a different vendor than an OpenAI/Codex subject-under-test.
model = "opus"

# ---- Projects (benchmark targets) -------------------------------------------
[[projects]]
name       = "python-basic"
path       = "python-basic"      # under projects_dir
answer_key = "python-basic.md"   # under answers_dir
theme      = "Textbook web-backend bugs"

[[projects]]
name       = "python-pricing"
path       = "python-pricing"
answer_key = "python-pricing.md"
theme      = "Subtle money-math correctness"

[[projects]]
name       = "python-scheduling"
path       = "python-scheduling"
answer_key = "python-scheduling.md"
theme      = "Date/time & calendar correctness"

# ---- Providers -------------------------------------------------------------
[providers.codex]
manual         = false
native         = false
label          = "codex"
model_labels   = ["gpt-5.5"]
color          = "#d94f1a"
color_dark     = "#e86a3a"
instructions   = "Automated. `bench run --provider codex -m <model> -e <effort>`. Uses `codex exec --json -s read-only` with the standard prompt; reports token usage incl. reasoning tokens."
models         = ["gpt-5.5"]
efforts        = ["low", "medium", "high", "xhigh"]
default_model  = "gpt-5.5"
default_effort = "high"

[providers.claude]
manual         = false
native         = false
label          = "claude"
model_labels   = ["opus-4.8"]
color          = "#b95fb0"
color_dark     = "#c56cbb"
instructions   = "Automated. `bench run --provider claude -m <model> -e <effort>`. Uses `claude -p --output-format json --permission-mode bypassPermissions --effort <e>` on a fresh copy with the standard prompt; reports total_cost_usd."
models         = ["claude-opus-4-8"]
efforts        = ["low", "medium", "high", "xhigh", "max"]
default_model  = "claude-opus-4-8"
default_effort = "high"

[providers.cursor-agent]
manual         = false
native         = false
label          = "cursor"
model_labels   = ["composer-2.5-fast"]
color          = "#1f77c4"
color_dark     = "#4a97e6"
instructions   = "Automated. `bench run --provider cursor-agent -m composer-2.5-fast`. Uses `cursor-agent -p --output-format json --model <m> --force --trust` (full-tree review on a fresh copy) with the standard prompt; reports token usage (cost computed from pricing.json)."
models         = ["composer-2.5-fast"]
efforts        = ["default"]
default_model  = "composer-2.5-fast"
default_effort = "default"

[providers.coderabbit]
manual         = false
native         = true
label          = "coderabbit"
model_labels   = ["coderabbit"]
color          = "#e0a01e"
color_dark     = "#b8871c"
instructions   = "Automated (native prompt). `bench run --provider coderabbit`. Reviews a git DIFF, not a working tree: the adapter turns the disposable copy into a one-commit repo on an empty base and runs `coderabbit review --base <empty> --agent --type all`. Uses CodeRabbit's OWN engine (does NOT take review_prompt.md), so results are labelled `native`. Needs `git` + `coderabbit auth` login; reports no tokens (speed only, no cost). Free accounts work but consume a per-account CLI allowance and may rate-limit."
models         = ["cli"]
efforts        = ["default"]
default_model  = "cli"
default_effort = "default"

[providers.cursor]
manual         = true
native         = false
label          = "cursor"
model_labels   = ["bugbot"]
color          = "#0a9d78"
color_dark     = "#17a37c"
instructions   = "Manual. In Cursor IDE, open projects/python-basic at the current commit (clean tree), trigger the reviewer, and paste the contents of review_prompt.md as the prompt. Copy ALL findings to a file, then: `bench judge --provider cursor --result <file>` (repeat --result for 3 runs). See docs/manual-tools.md."
models         = ["bugbot"]
efforts        = ["default"]
default_model  = "bugbot"
default_effort = "default"
