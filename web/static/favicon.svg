<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    .d { fill: #16150f; opacity: .5 }
    @media (prefers-color-scheme: dark) { .d { fill: #f4f2ea } }
  </style>
  <!-- 3×3 lattice; the top-right cell is empty — its mark broke rank -->
  <circle class="d" cx="5" cy="5" r="2.1"/>
  <circle class="d" cx="12" cy="5" r="2.1"/>
  <circle class="d" cx="5" cy="12" r="2.1"/>
  <circle class="d" cx="12" cy="12" r="2.1"/>
  <circle class="d" cx="19" cy="12" r="2.1"/>
  <circle class="d" cx="5" cy="19" r="2.1"/>
  <circle class="d" cx="12" cy="19" r="2.1"/>
  <circle class="d" cx="19" cy="19" r="2.1"/>
  <!-- the anomaly: a square, tilted, nudged out of the grid -->
  <rect x="17.8" y="1.2" width="5" height="5" rx="1.1" fill="#db4a3a" transform="rotate(15 20.3 3.7)"/>
</svg>
